{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Add Service</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#2c003e;color:white;">

<div class="container mt-5">

    <h2 class="text-center mb-4">➕ Add Service</h2>

    <div class="card p-4">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- CATEGORY -->
            <label>Service Category</label>
            <select name="service_category" class="form-control mb-3" required>
                <option value="">-- Select Category --</option>
                <option value="photography">Photography</option>
                <option value="catering">Catering</option>
                <option value="music">Music & DJ</option>
                <option value="beauty">Beauty</option>
                <option value="decoration">Decoration</option>
            </select>

            <!-- PRICE -->
            <label>Price</label>
            <input type="number" name="price" class="form-control mb-3" required>

            <!-- DESCRIPTION -->
            <label>Description</label>
            <textarea name="description" class="form-control mb-3"></textarea>

            <!-- IMAGE -->
            <label>Image</label>
            <input type="file" name="image" class="form-control mb-3">

            <button type="submit" class="btn btn-warning w-100">
                Add Service
            </button>

        </form>
    </div>

</div>

</body>
</html>

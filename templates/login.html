{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | EventMarket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0e0818, #3a0040);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
}

.login-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 40px;
    width: 100%;
    max-width: 400px;
    color: white;
}

.login-title {
    font-family: serif;
    font-size: 2rem;
    margin-bottom: 20px;
    text-align: center;
    color: #c9a84c;
}

.form-control {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
}

.form-control:focus {
    box-shadow: none;
    border-color: #c9a84c;
}

.btn-login {
    background: #c9a84c;
    color: #0e0818;
    width: 100%;
    padding: 10px;
    border: none;
}

.btn-login:hover {
    background: #e8c97a;
}

.register-link {
    text-align: center;
    margin-top: 15px;
    font-size: 0.9rem;
}
.register-link a {
    color: #c9a84c;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="login-card">

    <div class="login-title">Login</div>

    <form method="POST">
        {% csrf_token %}

        <!-- Email -->
        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-login">Login</button>

    </form>

    <div class="register-link">
        Don't have an account? 
        <a href="{% url 'user_register' %}">Register</a>
    </div>

</div>

</body>
</html>
